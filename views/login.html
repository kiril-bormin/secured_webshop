<!doctype html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Shop - Connexion</title>
    <link rel="stylesheet" href="/css/main.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>
</head>

<body>
    <div id="topbar"></div>

    <main>
        <section class="hero">
            <div class="container">
                <form id="loginForm">
                    <div class="form-group">
                        <label for="email">Email :</label>
                        <input type="email" id="email" name="email" style="width: 400px; height: 3rem; font-size: 18px;" required />
                    </div>
                    <div class="form-group">
                        <label for="password">Mot de passe :</label>
                        <input type="password" id="password" name="password" style="width: 400px; height: 3rem; font-size: 18px;"  required />
                    </div>

                    <div id="errorMessage" style="color: red; margin-bottom: 15px; display: none"></div>

                    <button type="submit">Se connecter</button>
                </form>
            </div>
        </section>
    </main>

    <footer id="contact" class="footer">
        <div class="container">
            <p>Projet pedagogique - ETML 183</p>
        </div>
    </footer>

    <script src="/js/nav.js"></script>
</body>

</html>
<script>
    const notyf = new Notyf();
    document.getElementById("loginForm").addEventListener("submit", async (e) => { // écoute de submission du formulaire de connexion (async pour pouvoir utiliser await à l'intérieur de la fonction)
        e.preventDefault(); // Empêcher le rechargement de la page 

        const formData = new FormData(e.target); // Crée un objet FormData à partir du formulaire soumis par l'utilisateur (illisible pour js)
        const data = Object.fromEntries(formData.entries()); // Transforme FormData en un objet js (ex: "email" : "alice@webshop.com", "password" : 1234)

        try {
            const response = await fetch("/api/auth/login", { // Envoie de la requete de connexion à backend (await pour attendre la réponse du backend avant de continuer)
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                },
                body: JSON.stringify(data),
            });

            const result = await response.json(); // Convertit la réponse du backend (json) en un objet js (cette méthode s'appelle .json qui indique le format source)

            if (response.ok) { // true pour les statuts HTTP 2xx
                console.log("Connexion réussie:", result);
                if (result.token) {
                    localStorage.setItem("token", result.token); // Stockage du token JWT dans localStorage pour les futures requêtes authentifiées
                }
                if (result.user) {
                    localStorage.setItem("user", JSON.stringify(result.user)); // convertit l'objet user en string avant de le stocker, car localStorage ne peut stocker que des chaînes de caractères
                }
                notyf.success("Connexion réussie !");
                setTimeout(() => {window.location.href = "/"; }, 1000); // petite pause pour laisser la notification s'afficher
            } else {
                notyf.error("Email ou mot de passe incorrect"); 

            }
        } catch (error) {
            console.error("Erreur réseau:", error); 
        }
    });
</script>
